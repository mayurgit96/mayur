# Run everything on ONE server: MongoDB + API + React (nginx)
# Usage: copy .env.example to .env, set PUBLIC_URL, then: docker compose up -d --build

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-mayur_abrasives}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mayur.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb

  web:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${PUBLIC_URL:-http://localhost}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:
