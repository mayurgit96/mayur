# Deploy frontend + backend on Render from one repo.
# MongoDB: use MongoDB Atlas — set MONGO_URL when prompted by Blueprint.
# GitHub: https://github.com/mayurgit96/mayur

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────
  - type: web
    name: mayur-abrasives-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: mayur_abrasives
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@mayur.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: mayur-abrasives-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend (React static site) ──────────────────────────────────
  - type: web
    name: mayur-abrasives-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && CI=true DISABLE_ESLINT_PLUGIN=true GENERATE_SOURCEMAP=false npm run build
    staticPublishPath: build
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: mayur-abrasives-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
